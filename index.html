<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>文章定制分享 · 名字替换阅读器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #eef2fa 0%, #dee6f2 100%);
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 2rem;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.6);
            overflow: hidden;
            margin-bottom: 1.8rem;
        }

        .card-header {
            background: #ffffffcc;
            padding: 1.5rem 2rem 0.8rem 2rem;
            border-bottom: 1px solid #eef2f9;
        }

        .card-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f3e5c, #2b5a7a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-content {
            padding: 1.8rem 2rem 2rem 2rem;
        }

        .btn {
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary {
            background: linear-gradient(100deg, #1f6392, #2b7aa3);
            color: white;
            box-shadow: 0 4px 10px rgba(31, 99, 146, 0.2);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(31, 99, 146, 0.25);
        }
        .btn-secondary {
            background: #ffffff;
            border: 1px solid #cbdbe0;
            color: #4a627a;
        }
        .btn-secondary:hover {
            background: #f1f5f9;
        }

        .link-box {
            background: #f1f5f9;
            border-radius: 1rem;
            padding: 0.8rem 1rem;
            margin: 1rem 0;
            word-break: break-all;
            font-size: 0.85rem;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .link-box input {
            flex: 1;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            outline: none;
        }
        .copy-btn {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .reader-name-area {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .reader-name-input {
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
            padding: 0.8rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 3rem;
            font-size: 1rem;
            text-align: center;
        }
        .article-preview {
            background: white;
            border-radius: 1.2rem;
            padding: 1.6rem;
            line-height: 1.65;
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 250px;
            border: 1px solid #eef2f8;
            font-size: 1rem;
        }
        .hidden {
            display: none;
        }
        .deploy-tip {
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #6c819e;
            background: #eef3ff;
            padding: 0.5rem;
            border-radius: 1rem;
            text-align: center;
        }
        .gist-input-group {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .gist-input-group input {
            flex: 1;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            border: 1px solid #cbd5e1;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 作者模式面板 -->
    <div id="authorPanel" class="card">
        <div class="card-header">
            <h2>📄 使用 GitHub Gist 分享文章</h2>
            <p style="font-size: 0.75rem; color:#6c819e; margin-top: 0.2rem;">
                在 Gist 中编写文章，使用 <code style="background:#eef2f8; padding:0.2rem 0.4rem; border-radius: 8px;">{{name}}</code> 作为读者名字占位符。
            </p>
        </div>
        <div class="card-content">
            <div class="gist-input-group">
                <input type="text" id="gistIdInput" placeholder="输入你的 Gist ID（例如 abc123def456）" autocomplete="off">
                <button id="verifyGistBtn" class="btn btn-secondary">🔍 验证并加载</button>
            </div>

            <div id="articlePreviewArea" class="hidden" style="margin-top: 1rem; background: #f8fafc; border-radius: 1rem; padding: 1rem;">
                <strong>📝 文章预览：</strong>
                <div id="articlePreviewContent" style="margin-top: 0.5rem; white-space: pre-wrap; word-break: break-word; max-height: 200px; overflow-y: auto;"></div>
            </div>

            <div style="display: flex; justify-content: flex-end; margin-top: 1rem;">
                <button id="generateLinkBtn" class="btn btn-primary">🔗 生成分享链接</button>
            </div>

            <div id="shareLinkContainer" class="hidden">
                <div class="link-box">
                    <input type="text" id="shareLinkInput" readonly>
                    <button id="copyLinkBtn" class="copy-btn">复制链接</button>
                </div>
            </div>
            <div class="deploy-tip">
                💡 提示：将 Gist ID 填入后，点击“生成分享链接”即可获得永久链接。读者打开链接后会看到专属名字替换界面。
            </div>
        </div>
    </div>

    <!-- 读者模式面板 -->
    <div id="readerPanel" class="card hidden">
        <div class="card-header">
            <h2>📖 专属阅读 · 输入你的名字</h2>
            <p style="font-size: 0.75rem; color:#6c819e;">文章中的 {{name}} 将替换为你输入的名字</p>
        </div>
        <div class="card-content">
            <div class="reader-name-area">
                <input type="text" id="readerNameInput" class="reader-name-input" placeholder="你的名字" autocomplete="off">
                <button id="readerUnlockBtn" class="btn btn-primary" style="margin-top: 1rem;">✨ 解锁文章 ✨</button>
            </div>
            <div id="readerArticlePreview" class="article-preview">
                等待输入名字...
            </div>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script src="utils.js"></script>
<script src="gist.js"></script>
<script src="author.js"></script>
<script src="reader.js"></script>
</body>
</html>
